spring.application.name=beluga
spring.datasource.url=${BELUGA_DATASOURCE_URL:jdbc:h2:file:./data/mydb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:db/schema.sql'}
spring.datasource.username=${BELUGA_DATASOURCE_USERNAME:sa}
spring.datasource.password=${BELUGA_DATASOURCE_PASSWORD:}
spring.sql.init.mode=embedded
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.jackson.default-property-inclusion=non_null
mybatis.configuration.map-underscore-to-camel-case=true
logging.level.com.thdwjdrl.yejeong.beluga=INFO
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
beluga.attach.upload-dir=uploads
