spring.application.name=beluga
spring.datasource.url=${BELUGA_DATASOURCE_URL:jdbc:h2:mem:beluga;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${BELUGA_DATASOURCE_USERNAME:sa}
spring.datasource.password=${BELUGA_DATASOURCE_PASSWORD:}
spring.sql.init.mode=embedded
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.jackson.default-property-inclusion=non_null
mybatis.configuration.map-underscore-to-camel-case=true

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger=INFO
logging.level.com.thdwjdrl.yejeong.beluga=INFO